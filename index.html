<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Expedientes — Proveedores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --ink:#151b2e;
    --ink-soft:#2a3352;
    --paper:#eef1f0;
    --paper-card:#f7f8f6;
    --kraft:#d9c9a3;
    --kraft-dark:#b9a06a;
    --kraft-tab:#e7d9b4;
    --stamp-red:#b23a2e;
    --stamp-red-soft:#f4dcd8;
    --stamp-amber:#a9772b;
    --stamp-amber-soft:#f3e3c8;
    --stamp-green:#2f5d3a;
    --stamp-green-soft:#dbe9dc;
    --line:#c9cdc4;
    --shadow: 0 1px 0 rgba(21,27,46,.05), 0 8px 20px -12px rgba(21,27,46,.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 500px at 10% -10%, rgba(217,201,163,.35), transparent 60%),
      var(--paper);
    color:var(--ink);
    font-family:'Inter', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:32px 20px 80px;
  }
  .wrap{max-width:1180px;margin:0 auto;}

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
    opacity:.7;
    margin:0 0 6px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(28px,4vw,42px);
    margin:0 0 6px;
    letter-spacing:-.01em;
    line-height:1.05;
  }
  .subtitle{
    font-size:14px;
    color:var(--ink-soft);
    opacity:.85;
    margin:0 0 28px;
  }
  .subtitle b{color:var(--ink);}

  /* ---- Upload bar ---- */
  .upload-bar{
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    flex-wrap:wrap;
    background:var(--paper-card);
    border:1px dashed var(--kraft-dark);
    border-radius:10px;
    padding:12px 16px;
    margin-bottom:22px;
  }
  .upload-status{
    font-size:12.5px; color:var(--ink-soft);
  }
  .upload-status b{color:var(--ink);}
  .upload-actions{display:flex; gap:8px; flex-wrap:wrap;}
  .upload-btn.refresh{background:var(--stamp-green);}
  .upload-btn.refresh:hover{background:#264a2e;}
  .upload-btn.secondary{background:transparent; color:var(--ink-soft); border:1px solid var(--line);}
  .upload-btn.secondary:hover{background:var(--paper);}
  .upload-btn{
    background:var(--ink); color:#fff; font-size:12.5px; font-weight:600;
    padding:9px 14px; border-radius:8px; cursor:pointer; white-space:nowrap;
    font-family:'IBM Plex Mono', monospace; letter-spacing:.02em;
    transition:background .15s ease; border:none; display:inline-flex; align-items:center; gap:6px;
  }
  .upload-btn:hover{background:var(--ink-soft);}
  .upload-error{
    background:var(--stamp-red-soft); color:var(--stamp-red); font-size:12.5px;
    padding:10px 14px; border-radius:8px; margin:-12px 0 22px;
  }

  /* ---- Folder tab stat cards ---- */
  .rack{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
    gap:14px;
    margin-bottom:9px;
  }
  .tab{
    position:relative;
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:10px 10px 4px 4px;
    padding:18px 16px 16px;
    cursor:pointer;
    text-align:left;
    box-shadow:var(--shadow);
    transition:transform .16s ease, box-shadow .16s ease;
    font-family:inherit;
    color:inherit;
  }
  .tab::before{
    content:'';
    position:absolute;
    top:-9px; left:14px;
    width:46%;
    height:14px;
    background:var(--kraft-tab);
    border:1px solid var(--line);
    border-bottom:none;
    border-radius:6px 6px 0 0;
  }
  .tab:hover{transform:translateY(-3px);}
  .tab:focus-visible{outline:3px solid var(--ink-soft); outline-offset:2px;}
  .tab.active{box-shadow:0 0 0 2px var(--ink) inset, var(--shadow);}
  .tab .num{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:34px;
    line-height:1;
    display:block;
    margin-bottom:6px;
  }
  .tab .lbl{
    font-size:12.5px;
    color:var(--ink-soft);
    font-weight:600;
  }
  .tab.sev-ok .num{color:var(--stamp-green);}
  .tab.sev-warn .num{color:var(--stamp-amber);}
  .tab.sev-bad .num{color:var(--stamp-red);}
  .tab.sev-neutral .num{color:var(--ink);}

  .stamp-badge{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:2px 7px;
    border-radius:20px;
    margin-top:8px;
  }
  .sev-ok .stamp-badge{background:var(--stamp-green-soft); color:var(--stamp-green);}
  .sev-warn .stamp-badge{background:var(--stamp-amber-soft); color:var(--stamp-amber);}
  .sev-bad .stamp-badge{background:var(--stamp-red-soft); color:var(--stamp-red);}

  /* ---- Drawer (opens below cards) ---- */
  .drawer{
    margin-top:22px;
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:12px;
    box-shadow:var(--shadow);
    overflow:hidden;
    max-height:0;
    opacity:0;
    transition:max-height .35s ease, opacity .3s ease, margin .35s ease;
  }
  .drawer.open{max-height:2000px; opacity:1;}
  .drawer-inner{padding:22px 24px 26px;}
  .drawer-head{
    display:flex; align-items:baseline; justify-content:space-between; gap:12px;
    margin-bottom:14px; flex-wrap:wrap;
  }
  .drawer-title{
    font-family:'Fraunces', serif;
    font-size:20px;
    font-weight:600;
  }
  .drawer-count{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    opacity:.75;
  }
  .close-btn{
    background:none; border:1px solid var(--line); border-radius:6px;
    padding:5px 10px; font-size:12px; cursor:pointer; color:var(--ink-soft);
    font-family:'IBM Plex Mono', monospace;
  }
  .close-btn:hover{background:var(--paper);}

  .card-row{
    display:grid;
    grid-template-columns: 1fr;
    gap:10px;
  }
  .prov-card{
    display:grid;
    grid-template-columns: 1fr auto;
    gap:6px 16px;
    align-items:center;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--paper);
  }
  .prov-name{font-weight:600; font-size:14px;}
  .prov-meta{font-size:12.5px; color:var(--ink-soft); opacity:.85; margin-top:2px;}
  .prov-mail{
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .prov-detail{
    font-size:12px;
    text-align:right;
    font-family:'IBM Plex Mono', monospace;
  }
  .prov-detail.bad{color:var(--stamp-red);}
  .prov-detail.warn{color:var(--stamp-amber);}
  .prov-detail.ok{color:var(--stamp-green);}
  .missing-tag{
    display:inline-block;
    font-size:11px;
    background:var(--stamp-red-soft);
    color:var(--stamp-red);
    padding:1px 6px;
    border-radius:20px;
    margin:2px 3px 0 0;
  }

  .empty-msg{padding:20px; text-align:center; color:var(--ink-soft); font-size:13px;}

  /* ---- Params ---- */
  details.params{margin-top:26px; font-size:13px;}
  details.params summary{
    cursor:pointer; font-family:'IBM Plex Mono', monospace; font-size:11px;
    letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft);
    padding:6px 0;
  }
  .params-grid{
    display:flex; gap:22px; flex-wrap:wrap; padding:14px 0 6px;
  }
  .param-item label{display:block; font-size:11.5px; color:var(--ink-soft); margin-bottom:4px;}
  .param-item input{
    width:80px; padding:6px 8px; border:1px solid var(--line); border-radius:6px;
    font-family:'IBM Plex Mono', monospace; font-size:13px; background:var(--paper-card);
  }

  /* ---- Full table ---- */
  .table-section{margin-top:34px;}
  .table-toolbar{
    display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px;
  }
  .table-toolbar input[type=text]{
    flex:1; min-width:200px; padding:9px 12px; border:1px solid var(--line);
    border-radius:8px; font-size:13px; background:var(--paper-card); color:var(--ink);
  }
  .table-toolbar select{
    padding:9px 10px; border:1px solid var(--line); border-radius:8px;
    font-size:13px; background:var(--paper-card); color:var(--ink);
  }
  .tbl-wrap{
    border:1px solid var(--line); border-radius:12px; overflow:hidden; background:var(--paper-card);
  }
  table{width:100%; border-collapse:collapse; font-size:12.5px;}
  thead th{
    text-align:left; padding:10px 12px; background:var(--ink); color:#fff;
    font-family:'IBM Plex Mono', monospace; font-size:10.5px; letter-spacing:.06em;
    text-transform:uppercase; position:sticky; top:0;
  }
  tbody td{padding:10px 12px; border-top:1px solid var(--line); vertical-align:top;}
  tbody tr:hover{background:var(--paper);}
  .badge{
    display:inline-block; font-family:'IBM Plex Mono', monospace; font-size:10px;
    letter-spacing:.05em; text-transform:uppercase; padding:2px 8px; border-radius:20px;
  }
  .badge.ok{background:var(--stamp-green-soft); color:var(--stamp-green);}
  .badge.warn{background:var(--stamp-amber-soft); color:var(--stamp-amber);}
  .badge.bad{background:var(--stamp-red-soft); color:var(--stamp-red);}
  .badge.neutral{background:#e4e4e0; color:var(--ink-soft);}

  footer{margin-top:30px; font-size:11.5px; color:var(--ink-soft); opacity:.6; text-align:center;}

  @media (max-width:640px){
    .prov-card{grid-template-columns:1fr;}
    .prov-detail{text-align:left;}
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Almacén · Expedientes de Proveedores</p>
  <h1>Control de Expedientes</h1>
  <p class="subtitle" id="subtitle"></p>

  <div class="upload-bar" id="uploadBar">
    <div class="upload-status" id="uploadStatus">
      Mostrando datos
    </div>
    <div class="upload-actions">
      <button class="upload-btn refresh" id="gsheetRefreshBtn" style="display:none;">🔄 Refrescar desde Google</button>
      <button class="upload-btn secondary" id="gsheetSetupBtn">⚙️ Conectar Google</button>
    </div>
  </div>
  <div class="upload-error" id="uploadError" style="display:none;"></div>

  <details class="params" id="gsheetSetup" style="margin-top:-14px; margin-bottom:22px;">
    <summary>⚙️ Conexión con Google Sheets</summary>
    <div class="params-grid" style="flex-direction:column; align-items:stretch; gap:12px;">
      <div class="param-item" style="width:100%;">
        <label>Proveedores</label>
        <input type="text" id="provUrl" placeholder="https://docs.google.com/spreadsheets/d/e/…/pub?output=csv" style="width:100%;">
      </div>
      <div class="param-item" style="width:100%;">
        <label>Expediente_Vigencias</label>
        <input type="text" id="evUrl" placeholder="https://docs.google.com/spreadsheets/d/e/…/pub?output=csv" style="width:100%;">
      </div>
      <div>
        <button class="upload-btn" id="saveGsheetBtn">Guardar y cargar</button>
      </div>
    </div>
  </details>

  <details class="params" style="margin-top:-14px; margin-bottom:28px;">
    <summary>📂 Manual</summary>
    <div class="params-grid" style="padding-top:14px;">
      <button class="upload-btn" id="pickBtn">📂 Elegir mi Excel</button>
      <button class="upload-btn refresh" id="refreshBtn" style="display:none;">🔄 Refrescar</button>
      <label class="upload-btn secondary" id="fallbackLabel" style="display:none;">
        📂 Subir Excel
        <input type="file" id="fileInput" accept=".xlsx,.xlsm,.xlsb,.xls" hidden>
      </label>
    </div>
  </details>

  <div class="rack" id="rack"></div>

  <div class="drawer" id="drawer">
    <div class="drawer-inner">
      <div class="drawer-head">
        <div>
          <div class="drawer-title" id="drawerTitle">—</div>
          <div class="drawer-count" id="drawerCount"></div>
        </div>
        <button class="close-btn" id="closeDrawer">Cerrar ✕</button>
      </div>
      <div class="card-row" id="drawerList"></div>
    </div>
  </div>

  <details class="params">
    <summary>Ajustar parámetros de vigencia</summary>
    <div class="params-grid">
      <div class="param-item">
        <label>Aviso contrato (días)</label>
        <input type="number" id="pAlertContrato" value="15" min="0">
      </div>
      <div class="param-item">
        <label>Aviso opinión (días)</label>
        <input type="number" id="pAlertOdec" value="15" min="0">
      </div>
      <div class="param-item">
        <label>Vigencia opinión (días)</label>
        <input type="number" id="pVigenciaOdec" value="90" min="1">
      </div>
    </div>
  </details>

  <div class="table-section">
    <div class="table-toolbar">
      <input type="text" id="search" placeholder="Buscar proveedor, contacto o correo…">
      <select id="filterClasif"><option value="">Todas las clasificaciones</option></select>
      <select id="filterSemaforo">
        <option value="">Todos los estatus</option>
        <option value="ACCION">Acción requerida</option>
        <option value="REVISAR">A revisar</option>
        <option value="OK">OK</option>
      </select>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>Proveedor</th>
            <th>Correo</th>
            <th>Expediente</th>
            <th>Contrato</th>
            <th>Opinión Cumpl.</th>
            <th>Estatus</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

let PARAMS = { alertContrato: 15, alertOdec: 15, vigenciaOdec: 90 };

function parseDate(s){
  if(!s) return null;
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function todayMid(){
  const t = new Date();
  return new Date(t.getFullYear(), t.getMonth(), t.getDate());
}
function addDays(date, n){
  const d = new Date(date);
  d.setDate(d.getDate()+n);
  return d;
}
function daysBetween(a,b){
  return Math.round((a-b)/86400000);
}
function fmt(date){
  if(!date) return '—';
  return date.toLocaleDateString('es-MX', {day:'2-digit', month:'short', year:'numeric'});
}

function compute(){
  const today = todayMid();
  return RAW.map(p=>{
    const docsVals = Object.values(p.docs);
    const docsCompletos = docsVals.filter(v=>v==='Recibido'||v==='No aplica').length;
    const expedienteStatus = docsCompletos===6 ? 'COMPLETO' : 'INCOMPLETO';
    const missing = Object.entries(p.docs).filter(([k,v])=>v==='Pendiente').map(([k])=>DOC_LABELS[k]||k);

    const contratoFecha = parseDate(p.contratoFecha);
    let contratoStatus = 'SIN DATO', diasContrato = null;
    if(contratoFecha){
      diasContrato = daysBetween(contratoFecha, today);
      contratoStatus = diasContrato<0 ? 'VENCIDO' : (diasContrato<=PARAMS.alertContrato ? 'POR VENCER' : 'VIGENTE');
    }

    const odecFecha = parseDate(p.odecFecha);
    let odecVence=null, odecStatus='SIN DATO', diasOdec=null;
    if(odecFecha){
      odecVence = addDays(odecFecha, PARAMS.vigenciaOdec);
      diasOdec = daysBetween(odecVence, today);
      odecStatus = diasOdec<0 ? 'VENCIDO' : (diasOdec<=PARAMS.alertOdec ? 'POR VENCER' : 'VIGENTE');
    }

    let semaforo = 'OK';
    if(expedienteStatus==='INCOMPLETO' || contratoStatus==='VENCIDO' || odecStatus==='VENCIDO') semaforo='ACCION';
    else if(contratoStatus==='POR VENCER' || odecStatus==='POR VENCER') semaforo='REVISAR';

    return {...p, docsCompletos, expedienteStatus, missing, contratoFecha, contratoStatus, diasContrato,
             odecFecha, odecVence, odecStatus, diasOdec, semaforo};
  });
}

const DOC_LABELS = {
  autorizacion:'Autorización de abono', poder:'Poder notarial / Aviso priv.',
  identificacion:'Identificación', csf:'CSF', compDom:'Comp. domicilio', edoCta:'Edo. cuenta'

// ---- Cargar un Excel actualizado (Proveedores + Expediente_Vigencias) ----
// Se espera la misma estructura del archivo "ALMACEN_dinamico.xlsx":
//   Hoja "Proveedores": id_proveedor, Razón_Social, Persona, RFC, Contacto_Principal, Correo, Teléfono, Clasificación, Estatus
//   Hoja "Expediente_Vigencias": id_proveedor, Razón_Social, Clasificación, Persona,
//     Autorización Abono, Poder Notarial/Aviso Priv, Identificación, CSF, Comp. Domicilio, Edo. Cuenta,
//     ... (col 13 = fecha vencimiento contrato, col 16 = fecha opinión recibida, col 21 = comentarios)
function toISO(d){
  if(!d) return null;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Convierte texto de una celda CSV de Google Sheets a fecha.
// Acepta ISO (2026-07-26) y formato día/mes/año (26/07/2026, el más común
// si tu hoja está en español/México). Si formateaste las columnas de
// fecha como "Fecha ISO" en Sheets, esto siempre va a funcionar sin ambigüedad.
function parseFlexibleDateString(str){
  if(str==null) return null;
  const s = String(str).trim();
  if(s==='') return null;
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){
    let day = Number(m[1]), month = Number(m[2]);
    const year = Number(m[3]);
    // Asumimos día/mes/año (locale México). Si "mes" no es válido (>12) y
    // "día" sí lo es, probablemente viene como mes/día/año (locale EE.UU.) — se invierte.
    if(month>12 && day<=12){ const tmp=day; day=month; month=tmp; }
    return new Date(year, month-1, day);
  }
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

// Toma las filas (array de arrays, fila 0 = encabezado) de las hojas
// Proveedores y Expediente_Vigencias y arma el arreglo RAW que usa el panel.
// dateParser: función para convertir el valor crudo de una celda de fecha a Date.
function buildRawFromRows(provRows, evRows, dateParser){
  const provById = {};
  for(let i=1;i<provRows.length;i++){
    const row = provRows[i];
    if(!row || row[0]==null || row[0]==='') continue;
    provById[row[0]] = {
      contacto: row[4] || '',
      correo: row[5] || '',
      tel: row[6] || '',
      rfc: row[3] || '',
    };
  }

  const newRaw = [];
  for(let i=1;i<evRows.length;i++){
    const row = evRows[i];
    if(!row || row[0]==null || row[0]==='') continue;
    const id = row[0];
    const prov = provById[id] || {};
    newRaw.push({
      id,
      razon: row[1] || '',
      persona: row[3] || '',
      rfc: prov.rfc || '',
      contacto: prov.contacto || '',
      correo: prov.correo || '',
      tel: prov.tel || '',
      clasif: row[2] || '',
      docs: {
        autorizacion: row[4] || 'Pendiente',
        poder: row[5] || 'Pendiente',
        identificacion: row[6] || 'Pendiente',
        csf: row[7] || 'Pendiente',
        compDom: row[8] || 'Pendiente',
        edoCta: row[9] || 'Pendiente',
      },
      contratoFecha: toISO(dateParser(row[12])),
      odecFecha: toISO(dateParser(row[15])),
      comentarios: row[20] || null,
    });
  }
  if(newRaw.length===0){
    throw new Error('Encontré la hoja pero no pude leer ningún renglón de proveedor. Revisa que no hayas movido las columnas.');
  }
  return newRaw;
}

function excelSerialToDate(v){
  if(v instanceof Date) return v;
  if(typeof v === 'number'){
    const parsed = XLSX.SSF.parse_date_code(v);
    if(parsed) return new Date(parsed.y, parsed.m-1, parsed.d);
  }
  if(typeof v === 'string' && v.trim()!==''){
    const d = new Date(v);
    if(!isNaN(d)) return d;
  }
  return null;
}

function handleWorkbook(workbook){
  const provSheetName = workbook.SheetNames.find(n=>n.toLowerCase().includes('proveedor'));
  const evSheetName = workbook.SheetNames.find(n=>n.toLowerCase().includes('expediente'));
  if(!evSheetName){
    throw new Error('No encontré una hoja llamada "Expediente_Vigencias" en ese archivo.');
  }
  const provRows = provSheetName
    ? XLSX.utils.sheet_to_json(workbook.Sheets[provSheetName], {header:1, raw:true, defval:null})
    : [];
  const evRows = XLSX.utils.sheet_to_json(workbook.Sheets[evSheetName], {header:1, raw:true, defval:null});
  return buildRawFromRows(provRows, evRows, excelSerialToDate);
}

// ---- Conexión con Google Sheets (publicado como CSV) ----
const LS_PROV_URL = 'panelExp_provUrl';
const LS_EV_URL = 'panelExp_evUrl';

function fetchCsvAsRows(url){
  return fetch(url, {cache:'no-store'})
    .then(r=>{
      if(!r.ok) throw new Error(`No pude descargar ese link (código ${r.status}). Revisa que esté publicado y sea público.`);
      return r.text();
    })
    .then(text=>{
      const parsed = Papa.parse(text, {header:false, skipEmptyLines:true});
      return parsed.data;
    });
}

async function loadFromGoogleSheets(provUrl, evUrl){
  document.getElementById('uploadError').style.display = 'none';
  try{
    const [provRows, evRows] = await Promise.all([
      provUrl ? fetchCsvAsRows(provUrl) : Promise.resolve([]),
      fetchCsvAsRows(evUrl),
    ]);
    const newRaw = buildRawFromRows(provRows, evRows, parseFlexibleDateString);
    RAW.length = 0;
    RAW.push(...newRaw);
    ACTIVE_FILTER = null;
    const now = new Date();
    document.getElementById('uploadStatus').innerHTML =
      `Conectado a <b>Google Sheets</b> · actualizado ${now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}`;
    document.getElementById('gsheetRefreshBtn').style.display = 'inline-flex';
    renderCards();
  }catch(err){
    showUploadError(err.message);
  }
}

document.getElementById('saveGsheetBtn').addEventListener('click', ()=>{
  const provUrl = document.getElementById('provUrl').value.trim();
  const evUrl = document.getElementById('evUrl').value.trim();
  if(!evUrl){
    showUploadError('Al menos pega el link de la pestaña "Expediente_Vigencias".');
    return;
  }
  localStorage.setItem(LS_PROV_URL, provUrl);
  localStorage.setItem(LS_EV_URL, evUrl);
  loadFromGoogleSheets(provUrl, evUrl);
});

document.getElementById('gsheetRefreshBtn').addEventListener('click', ()=>{

    try{
      const [handle] = await window.showOpenFilePicker({
        types: [{description:'Excel', accept:{'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet':['.xlsx'], 'application/vnd.ms-excel.sheet.binary.macroEnabled.12':['.xlsb']}}]
      });
      fileHandle = handle;
      const file = await handle.getFile();
      await loadFileObject(file, true);
      document.getElementById('refreshBtn').style.display = 'inline-flex';
      document.getElementById('pickBtn').textContent = '📂 Elegir otro archivo';
    }catch(err){
      if(err.name !== 'AbortError') showUploadError(err.message);
    }
  });
  document.getElementById('refreshBtn').addEventListener('click', async ()=>{
    if(!fileHandle) return;
    try{
      const file = await fileHandle.getFile();
      await loadFileObject(file, true);
    }catch(err){
      showUploadError('No pude releer el archivo — si lo moviste o renombraste, vuelve a picar "Elegir otro archivo".');
    }
  });
} else {
  document.getElementById('pickBtn').style.display = 'none';
  document.getElementById('fallbackLabel').style.display = 'inline-flex';
}

function showUploadError(msg){
  const errBox = document.getElementById('uploadError');
  errBox.textContent = '⚠️ ' + (msg || 'No pude leer ese archivo. Asegúrate de subir el .xlsx sin cambiar la estructura de columnas.');
  errBox.style.display = 'block';
}

function loadFileObject(file, viaHandle){
  return new Promise((resolve)=>{
    document.getElementById('uploadError').style.display = 'none';
    const reader = new FileReader();
    reader.onload = function(ev){
      try{
        const data = new Uint8Array(ev.target.result);
        const workbook = XLSX.read(data, {type:'array', cellDates:true});
        const newRaw = handleWorkbook(workbook);
        RAW.length = 0;
        RAW.push(...newRaw);
        ACTIVE_FILTER = null;
        const now = new Date();
        const tip = viaHandle ? ' · dale "Refrescar" cuando lo vuelvas a guardar' : '';
        document.getElementById('uploadStatus').innerHTML =
          `Mostrando <b>${file.name}</b> · actualizado ${now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}${tip}`;
        renderCards();
      }catch(err){
        showUploadError(err.message);
      }
      resolve();
    };
    reader.onerror = function(){
      showUploadError('No pude leer el archivo. Intenta de nuevo.');
      resolve();
    };
    reader.readAsArrayBuffer(file);
  });
}

function sevClass(kind, count){
  if(kind==='bad') return count>0 ? 'sev-bad':'sev-neutral';
  if(kind==='warn') return count>0 ? 'sev-warn':'sev-neutral';
  return 'sev-ok';
}

function renderCards(){
  ROWS = compute();
  const total = ROWS.length;

  const expIncompletos = ROWS.filter(r=>r.expedienteStatus==='INCOMPLETO');
  const contVencidos = ROWS.filter(r=>r.contratoStatus==='VENCIDO');
  const contPorVencer = ROWS.filter(r=>r.contratoStatus==='POR VENCER');
  const odecVencidos = ROWS.filter(r=>r.odecStatus==='VENCIDO');
  const odecPorVencer = ROWS.filter(r=>r.odecStatus==='POR VENCER');
  const accion = ROWS.filter(r=>r.semaforo==='ACCION');

  document.getElementById('subtitle').innerHTML =
    `Actualizado al <b>${fmt(todayMid())}</b> · <b>${total}</b> proveedores en el catálogo`;

  const cards = [
    {key:'expIncompletos', label:'Expedientes incompletos', list:expIncompletos, kind:'bad'},
    {key:'contVencidos', label:'Contratos vencidos', list:contVencidos, kind:'bad'},
    {key:'contPorVencer', label:'Contratos por vencer', list:contPorVencer, kind:'warn'},
    {key:'odecVencidos', label:'Opinión vencida', list:odecVencidos, kind:'bad'},
    {key:'odecPorVencer', label:'Opinión por vencer', list:odecPorVencer, kind:'warn'},
    {key:'accion', label:'Acción requerida (total)', list:accion, kind:'bad'},
  ];

  const rack = document.getElementById('rack');
  rack.innerHTML = '';
  cards.forEach(c=>{
    const btn = document.createElement('button');
    btn.className = `tab ${sevClass(c.kind, c.list.length)}${ACTIVE_FILTER===c.key?' active':''}`;
    btn.innerHTML = `<span class="num">${c.list.length}</span><span class="lbl">${c.label}</span>
      <span class="stamp-badge">${c.list.length>0 ? (c.kind==='bad'?'Revisar ya':'Próximamente') : 'Al día'}</span>`;
    btn.onclick = ()=> toggleDrawer(c.key, c.label, c.list);
    rack.appendChild(btn);
  });

  populateClasifOptions();
  renderTable();

  if(ACTIVE_FILTER){
    const c = cards.find(x=>x.key===ACTIVE_FILTER);
    if(c) openDrawer(c.label, c.list); else closeDrawer();
  }
}

function detailFor(kind, r){
  if(kind==='expIncompletos'){
    return {cls:'', html: r.missing.map(m=>`<span class="missing-tag">${m}</span>`).join('')};
  }
  if(kind==='contVencidos' || kind==='contPorVencer'){
    const cls = kind==='contVencidos' ? 'bad':'warn';
    const txt = r.diasContrato<0 ? `Venció hace ${Math.abs(r.diasContrato)} días` : `Vence en ${r.diasContrato} días`;
    return {cls, html: `${fmt(r.contratoFecha)}<br>${txt}`};
  }
  if(kind==='odecVencidos' || kind==='odecPorVencer'){
    const cls = kind==='odecVencidos' ? 'bad':'warn';
    const txt = r.diasOdec<0 ? `Venció hace ${Math.abs(r.diasOdec)} días` : `Vence en ${r.diasOdec} días`;
    return {cls, html: `${fmt(r.odecVence)}<br>${txt}`};
  }
  if(kind==='accion'){
    const reasons = [];
    if(r.expedienteStatus==='INCOMPLETO') reasons.push('expediente incompleto');
    if(r.contratoStatus==='VENCIDO') reasons.push('contrato vencido');
    if(r.odecStatus==='VENCIDO') reasons.push('opinión vencida');
    return {cls:'bad', html: reasons.join(' · ')};
  }
  return {cls:'', html:''};
}

function toggleDrawer(key, label, list){
  if(ACTIVE_FILTER===key){ ACTIVE_FILTER=null; closeDrawer(); renderCards(); return; }
  ACTIVE_FILTER = key;
  openDrawer(label, list);
  renderCards();
}

function openDrawer(label, list){
  const drawer = document.getElementById('drawer');
  document.getElementById('drawerTitle').textContent = label;
  document.getElementById('drawerCount').textContent = `${list.length} proveedor${list.length===1?'':'es'}`;
  const box = document.getElementById('drawerList');
  box.innerHTML = '';
  if(list.length===0){
    box.innerHTML = '<div class="empty-msg">Nada que mostrar aquí — todo en orden.</div>';
  } else {
    list.sort((a,b)=>a.razon.localeCompare(b.razon)).forEach(r=>{
      const d = detailFor(ACTIVE_FILTER, r);
      const el = document.createElement('div');
      el.className = 'prov-card';
      el.innerHTML = `
        <div>
          <div class="prov-name">${r.razon}</div>
          <div class="prov-meta">${r.contacto||''}</div>
          <div class="prov-mail">${r.correo||'sin correo registrado'}</div>
        </div>
        <div class="prov-detail ${d.cls}">${d.html}</div>`;
      box.appendChild(el);
    });
  }
  drawer.classList.add('open');
  drawer.scrollIntoView({behavior:'smooth', block:'nearest'});
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  ACTIVE_FILTER = null;
}
document.getElementById('closeDrawer').onclick = ()=>{ closeDrawer(); renderCards(); };

function populateClasifOptions(){
  const sel = document.getElementById('filterClasif');
  const current = sel.value;
  const uniq = [...new Set(ROWS.map(r=>r.clasif).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Todas las clasificaciones</option>' +
    uniq.map(c=>`<option value="${c}">${c}</option>`).join('');
  sel.value = current;
}

function badgeHtml(status){
  const map = {VIGENTE:'ok', 'POR VENCER':'warn', VENCIDO:'bad', 'SIN DATO':'neutral', COMPLETO:'ok', INCOMPLETO:'bad'};
  return `<span class="badge ${map[status]||'neutral'}">${status}</span>`;
}

function renderTable(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const clasif = document.getElementById('filterClasif').value;
  const sem = document.getElementById('filterSemaforo').value;
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  const filtered = ROWS.filter(r=>{
    if(clasif && r.clasif!==clasif) return false;
    if(sem && r.semaforo!==sem) return false;
    if(q){
      const hay = `${r.razon} ${r.contacto||''} ${r.correo||''}`.toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b)=>a.razon.localeCompare(b.razon));

  if(filtered.length===0){
    tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">Sin resultados para ese filtro.</td></tr>';
    return;
  }

  filtered.forEach(r=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${r.razon}</strong><div class="prov-meta">${r.clasif||''}</div></td>
      <td class="prov-mail">${r.correo||'—'}</td>
      <td>${badgeHtml(r.expedienteStatus)}<div class="prov-meta">${r.docsCompletos}/6 docs</div></td>
      <td>${badgeHtml(r.contratoStatus)}<div class="prov-meta">${fmt(r.contratoFecha)}</div></td>
      <td>${badgeHtml(r.odecStatus)}<div class="prov-meta">${fmt(r.odecVence)}</div></td>
      <td>${badgeHtml(r.semaforo==='ACCION'?'VENCIDO':(r.semaforo==='REVISAR'?'POR VENCER':'VIGENTE'))}</td>
    `;
    tbody.appendChild(tr);
  });
}

document.getElementById('search').addEventListener('input', renderTable);
document.getElementById('filterClasif').addEventListener('change', renderTable);
document.getElementById('filterSemaforo').addEventListener('change', renderTable);

['pAlertContrato','pAlertOdec','pVigenciaOdec'].forEach(id=>{
  document.getElementById(id).addEventListener('input', (e)=>{
    PARAMS.alertContrato = Number(document.getElementById('pAlertContrato').value)||0;
    PARAMS.alertOdec = Number(document.getElementById('pAlertOdec').value)||0;
    PARAMS.vigenciaOdec = Number(document.getElementById('pVigenciaOdec').value)||90;
    renderCards();
  });
});

renderCards();
</script>
</body>
</html>
